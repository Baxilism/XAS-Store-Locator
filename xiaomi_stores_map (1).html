<style>
  :root {
    --bg: #f0f4f8;

    --border: #dde3ec;
    --accent: #ff6900;
    --accent2: #f59e0b;
    --text: #1a202c;
    --muted: #718096;

    --yellow: #ca8a04;

  body {

    background: var(--bg);

    height: 100vh;

    flex-direction: column;
    overflow: hidden;
  }

  header {

    background: var(--surface);
    border-bottom: 1px solid var(--border);

    gap: 16px;
    flex-shrink: 0;
    z-index: 1000;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 32px;
    height: 32px;
    background: var(--accent);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 14px;
    color: white;
    letter-spacing: -0.5px;
  }

  .logo-text {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    font-size: 16px;
    color: var(--text);
    letter-spacing: 0.5px;
  }

  .logo-text span { color: var(--accent); }

  .header-stats {
    display: flex;
    gap: 20px;
    margin-left: auto;
  }

  .stat { text-align: center; }

  .stat-num {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 18px;
    color: var(--accent);
    line-height: 1;
  }

  .stat-label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .legend {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-left: 20px;
    padding-left: 20px;
    border-left: 1px solid var(--border);
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--muted);
    font-weight: 500;
  }

  .legend-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 2px solid rgba(0,0,0,0.15);
  }

  #map { flex: 1; width: 100%; }

  .leaflet-popup-content-wrapper {
    background: #ffffff !important;
    border: 1px solid var(--border) !important;
    border-radius: 10px !important;
    box-shadow: 0 8px 24px rgba(0,0,0,0.12) !important;
    padding: 0 !important;
  }

  .leaflet-popup-tip { background: #ffffff !important; }
  .leaflet-popup-content { margin: 0 !important; }

  .popup-inner {
    padding: 14px 16px;
    min-width: 220px;
  }

  .popup-name {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    font-size: 14px;
    color: #1a202c;
    line-height: 1.3;
    margin-bottom: 6px;
  }

  .popup-rating {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 8px;
  }

  .popup-score {
    font-weight: 700;
    font-size: 13px;
  }

  .popup-count {
    font-size: 11px;
    color: var(--muted);
  }

  .popup-address {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.4;
    border-top: 1px solid var(--border);
    padding-top: 8px;
  }

  .leaflet-popup-close-button {
    color: var(--muted) !important;
    font-size: 16px !important;
    top: 8px !important;
    right: 10px !important;
  }
</style>
</head>

function getRatingColor(rating) {
  if (rating >= 5.0) return '#16a34a';
  if (rating >= 4.9) return '#65a30d';
  if (rating >= 4.8) return '#ca8a04';
  return '#ea580c';
}

function createDotIcon(rating) {
  const color = getRatingColor(rating);
  const svg = `
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20">
      <circle cx="10" cy="10" r="8" fill="${color}" stroke="white" stroke-width="2.5"/>
    </svg>`;
  return L.divIcon({
    html: svg,
    className: '',
    iconSize: [20, 20],
    iconAnchor: [10, 10],
    popupAnchor: [0, -12]
  });
}

function getStars(rating) {
  return '★'.repeat(Math.floor(rating)) + (rating % 1 >= 0.5 ? '½' : '') + '☆'.repeat(5 - Math.floor(rating) - (rating % 1 >= 0.5 ? 1 : 0));
}

const map = L.map('map', {
  center: [-6.25, 106.82],
  zoom: 10,
  zoomControl: true
});

// Bright light tile
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © CartoDB',
  subdomains: 'abcd',
  maxZoom: 19
}).addTo(map);

let totalRating = 0;
stores.forEach(store => {
  totalRating += store.rating;
  const icon = createDotIcon(store.rating);
  const color = getRatingColor(store.rating);
  const marker = L.marker([store.lat, store.lng], { icon }).addTo(map);

  const popupHTML = `
    <div class="popup-inner">
      <div class="popup-name">${store.name}</div>
      <div class="popup-rating">
        <span style="color:${color};font-size:13px">${getStars(store.rating)}</span>

        <span class="popup-count">(${store.count.toLocaleString()} reviews)</span>
      </div>
      <div class="popup-address">${store.address}</div>
    </div>`;

  marker.bindPopup(popupHTML, { maxWidth: 280 });
});

document.getElementById('avg-rating').textContent = (totalRating / stores.length).toFixed(2);
